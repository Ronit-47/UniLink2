# void main() async {
#   WidgetsFlutterBinding.ensureInitialized();
#   await Supabase.initialize(
#     url: 'YOUR_SUPABASE_URL',
#     anonKey: 'YOUR_ANON_KEY',
#   );
#   runApp(const MyApp());
# }
 
# AFTER:
