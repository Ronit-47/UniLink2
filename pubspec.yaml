# ─────────────────────────────────────────────────────────────────────────────
# ANDROID SETUP CHECKLIST
# ─────────────────────────────────────────────────────────────────────────────
#
# 1. android/build.gradle (project level) — add inside buildscript > dependencies:
#      classpath 'com.google.gms:google-services:4.4.2'
#
# 2. android/app/build.gradle (app level) — add at the very BOTTOM of the file:
#      apply plugin: 'com.google.gms.google-services'
#
# 3. Place google-services.json at:
#      android/app/google-services.json
#
# 4. Make sure minSdkVersion is at least 21 in android/app/build.gradle:
#      minSdkVersion 21
 
# ─────────────────────────────────────────────────────────────────────────────
# IOS SETUP CHECKLIST
# ─────────────────────────────────────────────────────────────────────────────
#
# 1. Open ios/Runner.xcworkspace in Xcode
# 2. Drag GoogleService-Info.plist into Runner/Runner folder
#    (Check "Copy items if needed" in the dialog)
# 3. Make sure iOS deployment target is 13.0 or higher
#    (Xcode → Runner → General → Minimum Deployments)
# 4. Run: cd ios && pod install